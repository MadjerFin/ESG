version: '3.8'

services:

  # ==============================
  # Ambiente: Produção
  # ==============================
  app-prod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cidades-esg-prod
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JAVA_OPTS=-Xms256m -Xmx512m
    networks:
      - esg-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    profiles:
      - prod

  # ==============================
  # Ambiente: Staging
  # ==============================
  app-staging:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cidades-esg-staging
    ports:
      - "8081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=staging
      - JAVA_OPTS=-Xms128m -Xmx256m
    networks:
      - esg-network
    restart: unless-stopped
    profiles:
      - staging

networks:
  esg-network:
    driver: bridge
