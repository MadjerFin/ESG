name: CI/CD - Cidades ESG Inteligentes

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  # ==============================
  # JOB 1: Build e Testes
  # ==============================
  build-and-test:
    name: Build e Testes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compilar projeto
        run: mvn clean compile -B

      - name: Executar testes
        run: mvn test -B

      - name: Gerar JAR
        run: mvn package -DskipTests -B

      - name: Upload do JAR como artefato
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  # ==============================
  # JOB 2: Build da imagem Docker
  # ==============================
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Build da imagem Docker
        run: docker build -t cidades-esg:${{ github.sha }} .

      - name: Teste básico do container
        run: |
          docker run -d --name esg-test -p 8080:8080 cidades-esg:${{ github.sha }}
          sleep 20
          curl --fail http://localhost:8080/api/cidades || exit 1
          docker stop esg-test

  # ==============================
  # JOB 3: Deploy Staging
  # ==============================
  deploy-staging:
    name: Deploy - Staging
    runs-on: ubuntu-latest
    needs: docker-build
    environment: staging

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Deploy Staging com Docker Compose
        run: |
          echo "🚀 Deploy no ambiente de STAGING (porta 8081)"
          docker compose --profile staging up -d --build
          echo "✅ Staging disponível em http://localhost:8081"

  # ==============================
  # JOB 4: Deploy Produção
  # ==============================
  deploy-prod:
    name: Deploy - Produção
    runs-on: ubuntu-latest
    needs: docker-build
    environment: production

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Deploy Produção com Docker Compose
        run: |
          echo "🚀 Deploy no ambiente de PRODUÇÃO (porta 8080)"
          docker compose --profile prod up -d --build
          echo "✅ Produção disponível em http://localhost:8080"
